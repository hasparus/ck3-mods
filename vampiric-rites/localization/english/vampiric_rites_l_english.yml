l_english:
 vampiric_crimson_bath_decision: "The Crimson Bath"
 vampiric_crimson_bath_decision_tooltip: "An ancient rite, half-remembered and half-feared. The texts that describe it survive only in the libraries of master physicians — and even then, in pages bound at the back. A captive of your dungeons gives up their blood; you take back the years."
 vampiric_crimson_bath_decision_confirm: "Begin the Rite"
 vampiric_crimson_bath_decision_desc: "Behind sealed doors in the deepest cellar of your keep, the old rite is prepared. [vampiric_offering.GetFirstName], dragged from your dungeons, is bound to the iron table; the basin beneath fills slowly. You drink, and you wash, and somewhere in the long hour the ache in your bones begins to ease. By dawn you are someone younger. The servants who clean the chamber do not meet your eye."
