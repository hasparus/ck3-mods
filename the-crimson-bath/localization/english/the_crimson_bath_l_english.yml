l_english:
 decision_group_type_questionable_decisions: "Questionable Decisions"
 crimson_bath_decision: "The Crimson Bath"
 crimson_bath_decision_tooltip: "An ancient practice, half-remembered and half-feared. The texts that describe it survive only in the libraries of master physicians, and even then in pages bound at the back. A captive of your dungeons gives up their blood; you take back the years. Each affliction undone demands its own sacrifice."
 crimson_bath_decision_confirm: "Begin the ritual"
 crimson_bath_decision_desc: "Behind sealed doors in the deepest cellar of your keep, the old ritual is prepared. Captives, dragged from your dungeons, are bound to the iron table in turn; the basin beneath fills slowly. You drink, and you wash, and somewhere in the long hour the ache in your bones begins to ease. By dawn you are someone younger. The servants who clean the chamber do not meet your eye."
 crimson_bath_decision_effect_tt: "Removes one of [GetTrait('infirm').GetName( GetNullCharacter )|U], [GetTrait('clouded_eyes').GetName( GetNullCharacter )|U], [GetTrait('faltering_heart').GetName( GetNullCharacter )|U], [GetTrait('fragile_bones').GetName( GetNullCharacter )|U], or [GetTrait('withering_mind').GetName( GetNullCharacter )|U] in a forbidden ritual."

 crimson_bath_requires_whole_of_body_tt: "You have the [GetTrait('whole_of_body').GetName( GetNullCharacter )] trait"
 crimson_bath_requires_prisoner_tt: "You hold at least one captive younger than 30 in your dungeons"

 nick_the_vampire:0 "the Vampire"
 nick_the_vampire_desc:0 "Whispers in the kitchens and the cellars say that [CHARACTER.GetShortUINameNoTooltipNoFormat|U] stays young by drinking the blood of captives."
 nick_the_strigoi:0 "the Strigoi"
 nick_the_strigoi_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] is named for the restless dead of old folktales, who rise to feed on the living."
 nick_the_pale:0 "the Pale"
 nick_the_pale_desc:0 "Some at court call [CHARACTER.GetShortUINameNoTooltipNoFormat|U] this. They will not explain themselves."

 crimson_bath_kin_grief: "Bled my kin in the cellar"

 crimson_bath.0001.desc.position.first: "Behind sealed doors in the deepest cellar of your keep, the ritual begins. The first captive is led to the iron table; the basin beneath fills slowly."
 crimson_bath.0001.desc.position.next: "Another captive is led in. The basin below the iron table fills again."

 crimson_bath.0001.desc.malady.infirm: "The wasting grip you have carried for years releases your bones, finger by finger, like something letting go in the dark."
 crimson_bath.0001.desc.malady.clouded_eyes: "The world that had gone milky at the edges sharpens again. You see, for the first time in months, the grain of the wood and the coloured fibres in the linen."
 crimson_bath.0001.desc.malady.faltering_heart: "You feel it before you understand it: the irregular drum in your chest steadies, then steadies more, until what was a stuttering thing beats clean. You wonder how long it has been since you slept without listening for it."
 crimson_bath.0001.desc.malady.fragile_bones: "The knee that had begun to click takes the weight in silence. You straighten, slowly, and a long ache leaves you that you had stopped noticing."
 crimson_bath.0001.desc.malady.withering_mind: "Names you had been losing return like coins from a cleared pocket: the names of kin, of those long dead, of the books you read in your youth. The fog parts."

 crimson_bath.0001.desc.sadistic: "You relish their screams. The captive's terror at the basin is not lost on you, and you do not look away."

 crimson_bath.0001.a: "Open the vein"
 crimson_bath.0001.b: "Stop the ritual here"

 crimson_bath.0002.t: "Numb"
 crimson_bath.0002.desc: "The basin is emptied and refilled. You watch the next captive bound to the table without the old tightness in your chest. Whatever was once in you that flinched, it does not flinch any more."
 crimson_bath.0002.a: "So be it"

 crimson_bath.0003.t: "What You Have Become"
 crimson_bath.0003.desc: "Ten years since the tenth captive bled out at the iron table. Standing at the high window today, you saw your reflection in the polished glass and did not, for a moment, know yourself.\n\nThe colour is gone from your hair and skin. A weird strength is coursing through your veins. You feel sated."
 crimson_bath.0003.a: "Did I prowl in [crimson_bath_village.GetName]?"
 crimson_bath.0003.b: "Have I visited [crimson_bath_corridor_victim.GetFirstName] last night?"

 crimson_bath_hunting_grounds: "Hunting Grounds"
 crimson_bath_hunting_grounds_desc: "Something has been taking from this place in the night. The villagers do not speak of it. The reeve cannot collect what has not been earned."
