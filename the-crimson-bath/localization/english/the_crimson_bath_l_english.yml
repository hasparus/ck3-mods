l_english:
 crimson_bath_decision: "The Crimson Bath"
 crimson_bath_decision_tooltip: "An ancient rite, half-remembered and half-feared. The texts that describe it survive only in the libraries of master physicians — and even then, in pages bound at the back. A captive of your dungeons gives up their blood; you take back the years. Each affliction undone demands its own sacrifice."
 crimson_bath_decision_confirm: "Begin the Rite"
 crimson_bath_decision_desc: "Behind sealed doors in the deepest cellar of your keep, the old rite is prepared. Captives, dragged from your dungeons, are bound to the iron table in turn; the basin beneath fills slowly. You drink, and you wash, and somewhere in the long hour the ache in your bones begins to ease. By dawn you are someone younger. The servants who clean the chamber do not meet your eye."

 crimson_bath_requires_whole_of_body_tt: "You have the [GetTrait('whole_of_body').GetName( GetNullCharacter )] trait"
 crimson_bath_requires_prisoner_tt: "You hold at least one captive younger than 30 in your dungeons"

 nick_the_vampire:0 "the Vampire"
 nick_the_vampire_desc:0 "Whispers in the kitchens and the cellars say that [CHARACTER.GetShortUINameNoTooltipNoFormat|U] keeps young by drinking the blood of captives."
 nick_the_strigoi:0 "the Strigoi"
 nick_the_strigoi_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] is named for the restless dead of old folktales, who rise to feed on the living."
 nick_the_pale:0 "the Pale"
 nick_the_pale_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] is rarely seen by daylight, and the servants do not meet their eye."

 crimson_bath_kin_grief: "Bled my kin in the cellar"
