l_english:
 decision_group_type_questionable_decisions: "Questionable Decisions"
 zz_holy_site_vigil_decision: "Vigil at the Holy Site"
 zz_holy_site_vigil_decision_tooltip: "Devote yourself to your faith, and offer up a captive to seal it."
 zz_holy_site_vigil_decision_confirm: "Begin the vigil"

 zz_holy_site_vigil_decision_norse_desc: "A captive is bound to the sacred harrow. For a fortnight you fast and carve runes; on the last night, their blood waters the roots of the world-tree. Odin's whisper rides the wind home with you."
 zz_holy_site_vigil_decision_christian_desc: "You retire to a quiet monastery, fasting and keeping vigil before the relics. A heretic from your dungeons is given over to the Church's justice as the price of your contrition. When you emerge, the brothers say you carry the bearing of a saint."
 zz_holy_site_vigil_decision_islamic_desc: "Weeks of prayer, study, and almsgiving follow your retreat from court. An enemy of the faith, drawn from your dungeons, meets the executioner's blade as your offering. The faithful speak your name with new reverence."
 zz_holy_site_vigil_decision_tengri_desc: "You ride alone to the highest peak with a captive in chains. Beneath the Eternal Blue Sky, their blood is given to the wind and the eagles. You return lean and brittle, with a hardness in your eye."
 zz_holy_site_vigil_decision_default_desc: "You set aside the cares of rule for the divine. A captive is sacrificed. You return marked by it."

 zz_holy_site_vigil_decision_effect_tt: "A captive is offered at a holy place of your faith. The omens read may bless or curse what follows."

 zz_holy_site_vigil_requires_holy_site_tt: "Your realm contains a holy site of your faith"
 zz_holy_site_vigil_requires_prisoner_tt: "You hold at least one captive in your dungeons"

 zz_holy_site_desecration_decision: "Burn the Infidel Holy Place"
 zz_holy_site_desecration_decision_tooltip: "Burn and desecrate a holy site of another faith on which your army stands. The land will not recover for generations."
 zz_holy_site_desecration_decision_confirm: "Set the torches"
 zz_holy_site_desecration_decision_desc: "Your soldiers do not march and your priests do not pray. Pitch and torch are brought to the holy place; whatever can be torn down is torn down, and whatever cannot is fouled. You leave ash and rubble behind you. The peasants who creep back will speak of this for eighty years."
 zz_holy_site_desecration_decision_effect_tt: "Burn an infidel holy place. The county is left Desecrated for 80 years."

 zz_holy_site_desecration_requires_army_tt: "Your army stands on a holy site of a faith other than yours that you hold by right, by siege, or have just raided"

 zz_holy_site_desecrated: "Desecrated Ground"
 zz_holy_site_desecrated_desc: "The holy place was burned and fouled by [county.var:desecrator.GetTitledFirstName]. The land will not recover for generations."

 zz_holy_site_desecrated_punitive_war_cb: "Punitive War"
 ZZ_HOLY_SITE_DESECRATED_PUNITIVE_WAR_NAME: "$ATTACKER$'s Punitive War against $DEFENDER$"
 zz_holy_site_desecrated_punitive_war_victory_desc: "$ATTACKER$ has avenged the desecrated holy place. $DEFENDER$ is dragged in chains to the victor's dungeon."

 rival_zz_holy_site_desecrated: "Desecrated a holy place of my faith"

 vigil_holy_site.0002.t: "Vigil at the Holy Site"
 vigil_holy_site.0002.desc: "The hour approaches. The captives have been led from your dungeons; the holy place stands ready. One question remains before the knife is drawn: whose hand will hold it?"
 vigil_holy_site.0002.a: "I'll do it myself"
 vigil_holy_site.0002.b: "Let [vigil_chaplain.GetFirstName] officiate"
 vigil_holy_site.0002.c: "[vigil_captive_priest.GetFirstName] is here already. Use [vigil_captive_priest.GetHerHim]."
 vigil_holy_site.0002.d: "Abandon the plan"

 vigil_holy_site.0003.t: "Vigil at the Holy Site"
 vigil_holy_site.0003.a.norse: "Bind [vigil_offering_a.GetFirstName] to the harrow"
 vigil_holy_site.0003.a.christian: "Send [vigil_offering_a.GetFirstName] to the pyre"
 vigil_holy_site.0003.a.islamic: "Send [vigil_offering_a.GetFirstName] to the blade"
 vigil_holy_site.0003.a.tengri: "Take [vigil_offering_a.GetFirstName] to the peak"
 vigil_holy_site.0003.a.default: "Bind [vigil_offering_a.GetFirstName] to the altar"
 vigil_holy_site.0003.b.norse: "Bind [vigil_offering_b.GetFirstName] to the harrow instead"
 vigil_holy_site.0003.b.christian: "Send [vigil_offering_b.GetFirstName] to the pyre instead"
 vigil_holy_site.0003.b.islamic: "Send [vigil_offering_b.GetFirstName] to the blade instead"
 vigil_holy_site.0003.b.tengri: "Take [vigil_offering_b.GetFirstName] to the peak instead"
 vigil_holy_site.0003.b.default: "Bind [vigil_offering_b.GetFirstName] to the altar instead"
 vigil_holy_site.0003.c: "Abandon this place"

 vigil_holy_site.0004.t: "The Omens"
 vigil_holy_site.0004.desc.crit: "The signs are unmistakable. Smoke rises in a clean line; the carrion birds wheel three times and settle. Whatever your priests fear to name aloud, you have read it cleanly. The road ahead lies open, and the knife in the dark is no longer hidden from you."
 vigil_holy_site.0004.desc.success: "Your eyes find what they were meant to find. The signs settle in your mind, quiet and certain. You will carry this clarity for years."
 vigil_holy_site.0004.desc.ambiguous: "The signs are mixed. Smoke turns this way, then that. The blood pools without pattern. There is no message here, or none you can read. You bow your head and let the matter rest."
 vigil_holy_site.0004.desc.failure: "Something has gone wrong. The signs are not coherent; the air feels wrong; a servant runs out and is sick on the steps. Whatever you have looked at has looked back. You leave the holy place, and a part of you does not return with the rest."
 vigil_holy_site.0004.a: "So be it"

 vigil_blessed_by_omens: "Blessed by the Omens"
 vigil_blessed_by_omens_desc: "The signs at the holy place fell true. The world is open and your hand is steady."
 vigil_dark_omens: "Dark Omens"
 vigil_dark_omens_desc: "What was meant to bless you marked you instead."

 vigil_holy_site.0001.t: "Burn the Infidel Holy Place"
 vigil_holy_site.0001.desc: "Your soldiers do not march and your priests do not pray. Pitch and torch are brought to the holy place; whatever can be torn down will be torn down, and whatever cannot will be fouled. By dawn you will leave ash and rubble behind you. The peasants who creep back to this ground will speak of it for generations."
 vigil_holy_site.0001.a: "Set the torches"
 vigil_holy_site.0001.b: "Stay your hand"
