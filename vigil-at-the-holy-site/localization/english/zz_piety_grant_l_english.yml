l_english:
 zz_holy_site_vigil_decision: "Vigil at the Holy Site"
 zz_holy_site_vigil_decision_tooltip: "Devote yourself to your faith — and offer up a captive to seal the rite."
 zz_holy_site_vigil_decision_confirm: "Begin the Vigil"

 zz_holy_site_vigil_decision_norse_desc: "A captive is bound to the sacred harrow. For a fortnight you fast and carve runes; on the last night, their blood waters the roots of the world-tree. Odin's whisper rides the wind home with you."
 zz_holy_site_vigil_decision_christian_desc: "You retire to a quiet monastery, fasting and keeping vigil before the relics. A heretic from your dungeons is given over to the Church's justice as the price of your contrition. When you emerge, the brothers say you carry the bearing of a saint."
 zz_holy_site_vigil_decision_islamic_desc: "Weeks of prayer, study, and almsgiving follow your retreat from court. An enemy of the faith, drawn from your dungeons, meets the executioner's blade as your offering. The faithful speak your name with new reverence."
 zz_holy_site_vigil_decision_tengri_desc: "You ride alone to the highest peak with a captive in chains. Beneath the Eternal Blue Sky, their blood is given to the wind and the eagles. You return lean and brittle, with a hardness in your eye."
 zz_holy_site_vigil_decision_default_desc: "You set aside the cares of rule for the divine. A captive from your dungeons is given over to the rites your faith demands. When you return, the world is unchanged but you are not."

 zz_holy_site_vigil_requires_prisoner_tt: "You hold at least one captive in your dungeons"

 zz_holy_site_desecration_decision: "Burn the Infidel Holy Place"
 zz_holy_site_desecration_decision_tooltip: "Channel the zeal of your Vigil into ruin. Burn and desecrate a holy site of another faith on which your army stands. The land will not recover for generations."
 zz_holy_site_desecration_decision_confirm: "Set the Torches"
 zz_holy_site_desecration_decision_desc: "Your soldiers do not march and your priests do not pray. Pitch and torch are brought to the holy place; whatever can be torn down is torn down, and whatever cannot is fouled. You leave ash and rubble behind you. The peasants who creep back will speak of this for eighty years."

 zz_holy_site_desecration_requires_army_tt: "Your army stands on a holy site of a faith other than yours that you hold by right, by siege, or have just raided"

 zz_holy_site_desecrated: "Desecrated Ground"
 zz_holy_site_desecrated_desc: "The holy place was burned and fouled by foreign troops. The land will not recover for generations."

 zz_punitive_war_cb: "Punitive War"
 ZZ_PUNITIVE_WAR_NAME: "$ATTACKER$'s Punitive War against $DEFENDER$"
 zz_punitive_war_victory_desc: "$ATTACKER$ has avenged the desecrated holy place. $DEFENDER$ is dragged in chains to the victor's dungeon."

 rival_zz_holy_site_desecrated: "Desecrated a holy place of #L my faith#!"

 vigil_holy_site.0001.t: "Burn the Infidel Holy Place"
 vigil_holy_site.0001.desc: "Your soldiers do not march and your priests do not pray. Pitch and torch are brought to the holy place; whatever can be torn down will be torn down, and whatever cannot will be fouled. By dawn you will leave ash and rubble behind you. The peasants who creep back to this ground will speak of it for eighty years."
 vigil_holy_site.0001.a: "Set the Torches"
